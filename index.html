<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>User Management System</h1>
            <p class="subtitle">Manage your users efficiently</p>
        </header>

        <!-- Add/Edit User Form -->
        <div class="form-section">
            <h2 id="form-title">Add New User</h2>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required placeholder="Enter email">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" required placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" required placeholder="Enter last name">
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="submit" id="submit-btn" class="btn btn-primary"><span class="btn-icon" aria-hidden="true">➕</span>Add User</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary"
                        style="display: none;"><span class="btn-icon" aria-hidden="true">✖</span>Cancel</button>
                </div>
            </form>
        </div>

        <!-- Users Table Section -->
        <div class="table-section">
            <div class="table-header">
                <h2>All Users</h2>
                <button id="refresh-btn" class="btn btn-info"><span class="btn-icon" aria-hidden="true">🔄</span>Refresh</button>
            </div>
            <div id="loading" class="loading" style="display: none;">Loading...</div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <!-- Users will be loaded here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <h3>Confirm Delete</h3>
            <p>Are you sure you want to delete this user?</p>
            <div class="modal-buttons">
                <button id="confirm-delete" class="btn btn-danger"><span class="btn-icon" aria-hidden="true">🗑️</span>Delete</button>
                <button id="cancel-delete" class="btn btn-secondary"><span class="btn-icon" aria-hidden="true">✖</span>Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
